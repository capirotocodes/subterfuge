<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="O Subterfúgio - Um diário literário dedicado aos clássicos russos e literatura densa.">
    <title>O Subterfúgio | Início</title>
    <style>
        /* 1. Background Principal */
        body {
            background-image: url('fundo1.jpg');
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Georgia', serif;
            margin: 0;
            color: #0c0101;
        }

        /* 2. Header (Sticky e Sólido) */
        header {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('banner.png');
            background-size: cover;
            background-position: center;
            background-color: #5d4037; 
            color: #fff;
            padding: 2rem 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        header h1 {
            margin: 0 0 15px 0;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        nav a {
            color: #d7ccc8;
            margin: 0 10px;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.9rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            transition: color 0.3s, border-bottom 0.3s;
        }

        nav a:hover {
            color: #fff;
            border-bottom: 2px solid #e64a19;
        }

        /* 3. Área de Conteúdo */
        main {
            max-width: 1000px; /* Aumentado levemente para acomodar 3 cards confortavelmente */
            margin: 40px auto;
            background-color: rgba(241, 234, 234, 0.9); 
            padding: 30px;
            border-radius: 8px;
            min-height: 600px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #estante {
            display: flex;
            flex-wrap: wrap;
            justify-content: center; /* Centraliza os cards horizontalmente */
            gap: 10px;
        }

        .livro-card {
            width: 200px;
            margin: 20px;
            position: relative;
            border: 5px solid #fff;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            background-color: #fff;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .livro-card img {
            width: 100%;
            height: 280px; /* Altura fixa para alinhar as capas */
            object-fit: cover; /* Garante que a imagem preencha sem distorcer */
            display: block;
        }

        .status-leitura {
            position: absolute;
            top: 10px;
            left: -10px;
            background-color: #e64a19;
            color: white;
            padding: 5px 10px;
            font-size: 0.8rem;
            transform: rotate(-5deg);
            z-index: 10;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        footer {
            text-align: center;
            padding: 30px;
            background-color: #3e2723;
            color: white;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="main-title">📖 O Subterfúgio</h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="escritores.html">Escritores</a>
            <a href="donereads.html">Leituras</a>
            <a href="contos.html">Contos</a>
            <a href="contato.html">Contato</a>
            <a href="sobre.html">Sobre</a>
            <a href="galeria.html">Dark Art</a>
            <a href="tracks.html">Tracks</a>
        </nav>
    </header>

    <main>
        <h2 style="border-bottom: 2px solid #5d4037; padding-bottom: 10px; margin-bottom: 30px;">Leituras Atuais...</h2>
        
        <section id="estante">
            <article class="livro-card" data-autor="Dostoievski">
                <div class="status-leitura">Lendo agora</div>
                <img src="mocorongo.png" alt="Capa do livro O Mocorongo - Fiódor Dostoiévski">
                <p style="text-align: center; padding: 10px;"><strong>O mocorongo</strong><br><small>Fiódor Dostoiévski</small></p>
            </article>

             <article class="livro-card" data-autor="Bulgákov">
                <div class="status-leitura">Lendo agora</div>
                <img src="mortais.jpg" alt="Capa do livro Mortais - Atul Gawande">
                <p style="text-align: center; padding: 10px;"><strong>Mortais</strong><br><small>Atul Gawande</small></p>
            </article>

            <article class="livro-card" data-autor="Grossman">
                <div class="status-leitura" style="background-color: #388e3c;">Up Next!</div>
                <img src="TheRoad.jpg" alt="Capa do livro A Estrada - Vassili Grossman">
                <p style="text-align: center; padding: 10px;"><strong>A Estrada</strong><br><small>Vassili Grossman</small></p>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Diário de Leituras | Fausto Pantagruel</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
